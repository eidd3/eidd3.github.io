<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>eidd3 // writeups</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg:         #0d0d0f;
      --bg-card:    #111114;
      --bg-hover:   #16161a;
      --border:     #222228;
      --border-dim: #1a1a1f;
      --accent:     #e8e0cc;
      --accent2:    #b8a98c;
      --dim:        #4a4a55;
      --muted:      #2e2e38;
      --text:       #c8c4bc;
      --text-dim:   #7a7570;
      --info:       #5b8fb9;
      --tag-bg:     #18181e;
      --tag-border: #2a2a32;
      --font-mono:  'IBM Plex Mono', monospace;
      --font-sans:  'IBM Plex Sans', sans-serif;
      --radius:     2px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .site-wrap { max-width: 860px; margin: 0 auto; padding: 0 24px; }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 28px 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo { display: flex; flex-direction: column; gap: 2px; }
    .logo-primary { font-size: 20px; font-weight: 600; color: var(--accent); letter-spacing: -0.5px; }
    .logo-primary span { color: var(--dim); }
    .logo-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
    nav { display: flex; gap: 20px; align-items: center; }
    nav a { color: var(--text-dim); text-decoration: none; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; transition: color .15s; }
    nav a:hover { color: var(--accent); }

    /* HERO */
    .prompt-line { padding: 48px 0 36px; border-bottom: 1px solid var(--border-dim); }
    .prompt-line p { font-size: 12px; color: var(--dim); margin-bottom: 8px; }
    .prompt-line p::before { content: '$ '; color: var(--accent2); }
    .prompt-line h1 { font-size: 26px; font-weight: 500; color: var(--accent); line-height: 1.3; max-width: 520px; }
    .cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent2); vertical-align: middle; margin-left: 3px; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* FILTERS */
    .filters { padding: 24px 0 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .filters-label { font-size: 11px; color: var(--dim); letter-spacing: 1px; text-transform: uppercase; margin-right: 4px; }
    .tag-btn {
      background: var(--tag-bg); border: 1px solid var(--tag-border); color: var(--text-dim);
      font-family: var(--font-mono); font-size: 11px; padding: 4px 10px;
      border-radius: var(--radius); cursor: pointer; letter-spacing: .5px; transition: all .15s;
    }
    .tag-btn:hover, .tag-btn.active { border-color: var(--accent2); color: var(--accent2); }

    /* POST LIST */
    .post-list { padding: 8px 0 60px; }
    .post-item {
      border-bottom: 1px solid var(--border-dim);
      padding: 22px 0;
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: 0 24px;
      align-items: start;
      cursor: pointer;
      transition: background .15s, padding-left .15s;
    }
    .post-item:hover { background: var(--bg-hover); padding-left: 10px; }
    .post-meta { display: flex; flex-direction: column; gap: 4px; padding-top: 2px; }
    .post-date { font-size: 11px; color: var(--dim); white-space: nowrap; }
    .post-diff { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 2px 6px; border-radius: var(--radius); width: fit-content; }
    .diff-easy   { background: #0d1f17; color: #3d9970; border: 1px solid #1a3a28; }
    .diff-medium { background: #1a1609; color: #c49a2c; border: 1px solid #332a10; }
    .diff-hard   { background: #1a0d0d; color: #c0392b; border: 1px solid #331515; }
    .diff-insane { background: #130a1a; color: #8e44ad; border: 1px solid #261040; }
    .post-body { display: flex; flex-direction: column; gap: 6px; }
    .post-platform { font-size: 10px; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
    .post-title { font-size: 15px; font-weight: 500; color: var(--accent); line-height: 1.3; }
    .post-excerpt { font-size: 12px; color: var(--text-dim); max-width: 480px; line-height: 1.6; }
    .post-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .tag { font-size: 10px; color: var(--dim); border: 1px solid var(--muted); padding: 1px 7px; border-radius: var(--radius); letter-spacing: .5px; }
    .post-arrow { color: var(--dim); font-size: 16px; padding-top: 4px; transition: color .15s, transform .15s; }
    .post-item:hover .post-arrow { color: var(--accent2); transform: translateX(4px); }

    /* POST VIEW */
    #post-view { display: none; padding: 40px 0 80px; }
    .post-back {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--dim); cursor: pointer; margin-bottom: 36px;
      letter-spacing: .5px; text-transform: uppercase; transition: color .15s;
      border: none; background: none; font-family: var(--font-mono); padding: 0;
    }
    .post-back:hover { color: var(--accent); }
    .post-header { border-bottom: 1px solid var(--border); padding-bottom: 28px; margin-bottom: 36px; }
    .post-header-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .post-header h1 { font-size: 24px; font-weight: 500; color: var(--accent); line-height: 1.3; margin-bottom: 12px; }
    .post-header-bottom { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 10px; }

    /* MARKDOWN */
    .md-content { font-family: var(--font-sans); font-size: 14.5px; line-height: 1.85; color: var(--text); max-width: 720px; }
    .md-content h1,.md-content h2,.md-content h3,.md-content h4 { font-family: var(--font-mono); color: var(--accent); margin: 2em 0 .7em; font-weight: 500; line-height: 1.3; }
    .md-content h1 { font-size: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .md-content h2 { font-size: 17px; }
    .md-content h3 { font-size: 14.5px; color: var(--accent2); }
    .md-content p { margin-bottom: 1.1em; }
    .md-content a { color: var(--info); text-decoration: none; border-bottom: 1px solid rgba(91,143,185,.3); transition: border-color .15s; }
    .md-content a:hover { border-color: var(--info); }
    .md-content code { font-family: var(--font-mono); font-size: 12.5px; background: var(--bg-card); border: 1px solid var(--border); padding: 1px 6px; border-radius: var(--radius); color: var(--accent2); }
    .md-content pre { background: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid var(--accent2); padding: 18px 20px; overflow-x: auto; border-radius: var(--radius); margin: 1.2em 0; }
    .md-content pre code { background: none; border: none; padding: 0; font-size: 13px; color: var(--text); }
    .md-content blockquote { border-left: 3px solid var(--muted); padding: 10px 20px; margin: 1.2em 0; color: var(--text-dim); background: var(--bg-card); }
    .md-content blockquote p { margin: 0; }
    .md-content ul,.md-content ol { padding-left: 1.5em; margin-bottom: 1.1em; }
    .md-content li { margin-bottom: .4em; }
    .md-content img { max-width: 100%; border: 1px solid var(--border); border-radius: var(--radius); margin: 1em 0; }
    .md-content table { width: 100%; border-collapse: collapse; margin: 1.2em 0; font-size: 13px; font-family: var(--font-mono); }
    .md-content th { background: var(--bg-card); color: var(--accent); font-weight: 500; border: 1px solid var(--border); padding: 8px 14px; text-align: left; }
    .md-content td { border: 1px solid var(--border-dim); padding: 7px 14px; color: var(--text-dim); }
    .md-content tr:nth-child(even) td { background: rgba(255,255,255,.015); }
    .md-content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
    .flag-block { background: #0d1209; border: 1px solid #1e3018; border-left: 3px solid #3d9970; padding: 14px 18px; border-radius: var(--radius); margin: 1.5em 0; font-family: var(--font-mono); font-size: 13px; color: #3d9970; }
    .flag-block span { color: var(--text-dim); margin-right: 8px; }

    /* FOOTER */
    footer { border-top: 1px solid var(--border-dim); padding: 24px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    footer p { font-size: 11px; color: var(--dim); }
    footer a { color: var(--dim); text-decoration: none; transition: color .15s; }
    footer a:hover { color: var(--accent); }

    @media (max-width: 620px) {
      .post-item { grid-template-columns: 1fr; gap: 10px; }
      .post-meta { flex-direction: row; align-items: center; }
      .post-arrow { display: none; }
    }

    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div class="site-wrap">

  <header>
    <div class="logo">
      <div class="logo-primary">eidd3<span> //</span></div>
      <div class="logo-sub">CTF Writeups &amp; Security Research</div>
    </div>
    <nav>
      <a href="#" onclick="showList(); return false;">writeups</a>
      <a href="https://github.com/eidd3" target="_blank">github</a>
    </nav>
  </header>

  <div id="list-view">
    <div class="prompt-line">
      <p>cat /home/eidd3/README.md</p>
      <h1>Writeups de CTFs,<br>máquinas y challenges.<span class="cursor"></span></h1>
    </div>

   <div class="filters">
      <span class="filters-label">filter:</span>
      <button class="tag-btn active" onclick="filterPosts('all', this)">all</button>
      <button class="tag-btn" onclick="filterPosts('HackTheBox', this)">HackTheBox</button>
      <button class="tag-btn" onclick="filterPosts('TryHackMe', this)">TryHackMe</button>
      <button class="tag-btn" onclick="filterPosts('CTF', this)">CTF</button>
      <button class="tag-btn" onclick="filterPosts('pwn', this)">pwn</button>
      <button class="tag-btn" onclick="filterPosts('web', this)">web</button>
      <button class="tag-btn" onclick="filterPosts('rev', this)">rev</button>
    </div>
    <div class="post-list" id="post-list"></div>
  </div>

  <div id="post-view">
    <button class="post-back" onclick="showList()">← cd ..</button>
    <div class="post-header">
      <div class="post-header-meta">
        <span class="post-platform" id="pv-platform"></span>
        <span class="post-diff" id="pv-diff"></span>
      </div>
      <h1 id="pv-title"></h1>
      <div class="post-header-bottom">
        <span class="post-date" id="pv-date"></span>
        <div id="pv-tags" class="post-tags"></div>
      </div>
    </div>
    <div class="md-content" id="pv-content"></div>
  </div>

  <footer>
    <p>eidd3 &mdash; <a href="https://github.com/eidd3" target="_blank">github.com/eidd3</a></p>
  </footer>

</div>
<script>
/* ================================================================
================================================================ */
const POSTS = [

  {
    id: 4,
    title:      "UltraTech",
    platform:   "TryHackMe",       // HackTheBox | TryHackMe | CTF
    difficulty: "easy",           // easy | medium | hard | insane
    date:       "2025-01-11",
    excerpt:    "",
    tags:       ["web", "sqli"],
    content: `
## Reconocimiento Inicial

Se realiza un escaneo de puertos con **nmap** para identificar los servicios activos en la máquina objetivo (10.10.15.224):

```bash
nmap -sS -p- --open --min-rate 2000 -n -Pn 10.10.15.224
```


`
},

];

/* ================================================================
   ENGINE
================================================================ */
function diffClass(d) {
  return { easy:'diff-easy', medium:'diff-medium', hard:'diff-hard', insane:'diff-insane' }[d] || 'diff-easy';
}

function renderList(posts) {
  const c = document.getElementById('post-list');
  c.innerHTML = '';
  if (!posts.length) {
    c.innerHTML = '<p style="color:var(--dim);padding:24px 0;font-size:12px;">// no posts found</p>';
    return;
  }
  posts.forEach(p => {
    const el = document.createElement('div');
    el.className = 'post-item fade-in';
    el.onclick = () => showPost(p.id);
    el.innerHTML = `
      <div class="post-meta">
        <span class="post-date">${p.date}</span>
        <span class="post-diff ${diffClass(p.difficulty)}">${p.difficulty}</span>
      </div>
      <div class="post-body">
        <span class="post-platform">${p.platform}</span>
        <div class="post-title">${p.title}</div>
        <div class="post-excerpt">${p.excerpt}</div>
        <div class="post-tags">${p.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
      </div>
      <div class="post-arrow">→</div>
    `;
    c.appendChild(el);
  });
}

function filterPosts(filter, btn) {
  document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = filter === 'all'
    ? POSTS
    : POSTS.filter(p => p.platform === filter || p.tags.includes(filter));
  renderList(filtered);
}

function showPost(id) {
  const p = POSTS.find(x => x.id === id);
  if (!p) return;
  document.getElementById('pv-platform').textContent = p.platform;
  document.getElementById('pv-diff').textContent     = p.difficulty;
  document.getElementById('pv-diff').className       = `post-diff ${diffClass(p.difficulty)}`;
  document.getElementById('pv-title').textContent    = p.title;
  document.getElementById('pv-date').textContent     = p.date;
  document.getElementById('pv-tags').innerHTML       = p.tags.map(t=>`<span class="tag">#${t}</span>`).join('');
  document.getElementById('pv-content').innerHTML    = marked.parse(p.content.trim());
  document.getElementById('list-view').style.display = 'none';
  const pv = document.getElementById('post-view');
  pv.style.display = 'block';
  pv.classList.add('fade-in');
  window.scrollTo(0, 0);
}

function showList() {
  document.getElementById('post-view').style.display = 'none';
  document.getElementById('list-view').style.display = 'block';
  window.scrollTo(0, 0);
}

renderList(POSTS);
</script>
</body>
</html>
